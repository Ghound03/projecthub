{% extends "core/base.html" %}

{% block title %}New Message | ProjectHub{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="card shadow-sm">
            <div class="card-body">

                <h1 class="h3 mb-4">New Message</h1>

                <form method="post">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary">
                        Send Message
                    </button>

                    <a href="{% url 'inbox' %}" class="btn btn-secondary">
                        Cancel
                    </a>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
